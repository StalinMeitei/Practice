version: '3.8'

services:
  # PostgreSQL Database (pgedge compatible)
  postgres:
    image: postgres:15-alpine
    container_name: pgedge-as2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      # Enable pgEdge extensions
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"  # Exposed for DBeaver access
    networks:
      - as2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c listen_addresses='*'
      -c max_connections=200

  # P1 AS2 Server
  p1:
    build: .
    container_name: p1-as2
    command: >
      sh -c "
        cd /app/P1 &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        python /app/init_as2_config_simple.py p1 || true &&
        gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 wsgi:application
      "
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=p1_as2_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DJANGO_SETTINGS_MODULE=settings
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=http://192.168.1.200:8001,http://localhost:8001,http://127.0.0.1:8001
    volumes:
      - ./P1:/app/P1
      - p1_data:/app/P1/data
      - p1_static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - as2-network
    restart: unless-stopped

  # P2 AS2 Server
  p2:
    build: .
    container_name: p2-as2
    command: >
      sh -c "
        cd /app/P2 &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        python /app/init_as2_config_simple.py p2 || true &&
        gunicorn --bind 0.0.0.0:8002 --workers 3 --timeout 120 P2.wsgi:application
      "
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=p2_as2_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DJANGO_SETTINGS_MODULE=P2.settings
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=http://192.168.1.200:8001,http://localhost:8001,http://127.0.0.1:8001
      - USE_P2_PREFIX=true
    volumes:
      - ./P2:/app/P2
      - p2_data:/app/P2/data
      - p2_static:/app/static
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - as2-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-as2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - p1_static:/var/www/p1/static:ro
      - p2_static:/var/www/p2/static:ro
    ports:
      - "8001:80"
    depends_on:
      - p1
      - p2
    networks:
      - as2-network
    restart: unless-stopped

  # React Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: as2-frontend
    ports:
      - "3000:80"
    depends_on:
      - p1
      - p2
    networks:
      - as2-network
    restart: unless-stopped

volumes:
  postgres_data:
  p1_data:
  p2_data:
  p1_static:
  p2_static:

networks:
  as2-network:
    driver: bridge

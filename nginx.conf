events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Frontend Dashboard
    upstream frontend {
        server as2-frontend:80;
    }

    # P1 AS2 Server
    upstream p1_backend {
        server p1:8000;
    }

    # P2 AS2 Server
    upstream p2_backend {
        server p2:8002;
    }

    # P1 Server Configuration
    server {
        listen 80;
        server_name p1.as2.local localhost;

        location /static/ {
            alias /var/www/p1/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://p1_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }
    }

    # P2 Server Configuration
    server {
        listen 80;
        server_name p2.as2.local;

        location /static/ {
            alias /var/www/p2/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://p2_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }
    }

    # Default server - Routes to Dashboard
    server {
        listen 80 default_server;
        server_name _;

        # Dashboard (root path)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes to P1
        location /api/ {
            proxy_pass http://p1_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # P1 Admin
        location /admin/ {
            proxy_pass http://p1_backend/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }

        # P1 static files
        location /static/ {
            alias /var/www/p1/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # P2 static files
        location /p2/static/ {
            alias /var/www/p2/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # P2 routes
        location /p2/ {
            proxy_pass http://p2_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }

        # P1 pyas2 routes
        location /pyas2/ {
            proxy_pass http://p1_backend/pyas2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }
    }
}
